<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DESIRED</title>
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://i.ibb.co.com/WvbgTSjV/Desired-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="https://i.ibb.co.com/WvbgTSjV/Desired-icon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="https://i.ibb.co.com/WvbgTSjV/Desired-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.ibb.co.com/WvbgTSjV/Desired-icon.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="https://i.ibb.co.com/WvbgTSjV/Desired-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co.com/WvbgTSjV/Desired-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      (function() {
        const storedTheme = sessionStorage.getItem("theme");
        let theme = storedTheme;
        if (!theme) {
          const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          theme = isDark ? "dark" : "light";
          sessionStorage.setItem("theme", theme);
        }
        document.documentElement.classList.remove("light", "dark");
        document.documentElement.classList.add(theme);
        document.documentElement.style.colorScheme = theme;
        
        // Set immediate background color to prevent flash of wrong color
        document.documentElement.style.backgroundColor = theme === "dark" ? "#0a0a0a" : "#f9fafb";
        
        const meta = document.querySelector('meta[name="theme-color"]');
        if (meta) {
          meta.setAttribute("content", theme === "dark" ? "#0a0a0a" : "#f9fafb");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
